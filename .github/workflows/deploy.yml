name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Deploy Firestore Rules
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$SA_JSON" > /tmp/sa.json
          gcloud auth activate-service-account --key-file=/tmp/sa.json --quiet
          TOKEN=$(gcloud auth print-access-token)
          PROJECT=bingo-game-b09b8

          RULES=$(python3 -c "import json; print(json.dumps(open('firestore.rules').read()))")

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"source\":{\"files\":[{\"name\":\"firestore.rules\",\"content\":$RULES}]}}" \
            "https://firebaserules.googleapis.com/v1/projects/$PROJECT/rulesets")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Failed to create ruleset (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi

          RULESET=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['name'])")
          echo "Created ruleset: $RULESET"

          echo "=== Existing releases ==="
          curl -s -H "Authorization: Bearer $TOKEN" \
            "https://firebaserules.googleapis.com/v1/projects/$PROJECT/releases" | \
            python3 -c "import sys,json; data=json.load(sys.stdin); [print(json.dumps(r)) for r in data.get('releases',[])]"

          PATCH_RESP=$(curl -s -w "\n%{http_code}" -X PATCH \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"projects/$PROJECT/releases/cloud.firestore\",\"rulesetName\":\"$RULESET\"}" \
            "https://firebaserules.googleapis.com/v1/projects/$PROJECT/releases/cloud.firestore")
          PATCH_CODE=$(echo "$PATCH_RESP" | tail -1)
          PATCH_BODY=$(echo "$PATCH_RESP" | head -n -1)
          echo "PATCH response ($PATCH_CODE): $PATCH_BODY"
          if [ "$PATCH_CODE" != "200" ]; then
            exit 1
          fi

          echo "Firestore rules deployed successfully"

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: bingo-game-b09b8
